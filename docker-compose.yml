services:
  db:
    image: postgres:16-alpine
    container_name: clinical_case_tracker_db
    environment:
      POSTGRES_DB: clinical_cases
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d clinical_cases"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: clinical_case_tracker_api
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
